<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión · Blog Content Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(ellipse at top, #0d1b3e 0%, #070a12 60%);
      min-height: 100vh; display: flex; align-items: center;
    }
    .login-card {
      background: #1a1f2e;
      border: 1px solid #2d3348;
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(110,168,254,.08);
      padding: 2.5rem;
      max-width: 420px; width: 100%;
    }
    .login-logo  { font-size: 2.5rem; margin-bottom: .5rem; }
    .login-title { font-size: 1.3rem; font-weight: 700; color: #e8eaf0; margin-bottom: .25rem; }
    .login-sub   { font-size: .85rem; color: #8892a4; margin-bottom: 2rem; }
    .form-label  { color: #c8ccd8; font-size: .85rem; }
    .form-control {
      background: #0f1117 !important; color: #e8eaf0 !important;
      border: 1px solid #2d3348 !important; border-radius: 8px;
    }
    .form-control:focus {
      border-color: #6ea8fe !important;
      box-shadow: 0 0 0 .2rem rgba(110,168,254,.2) !important;
    }
    .form-control::placeholder { color: #3a4055; }
    .btn-outline-secondary {
      border-color: #2d3348; color: #8892a4; background: #0f1117;
    }
    .btn-outline-secondary:hover { background: #1a1f2e; color: #e8eaf0; border-color: #6ea8fe; }
    .btn-login {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none; padding: .7rem; font-weight: 700; letter-spacing: .4px;
      color: #fff; border-radius: 8px; font-size: 1rem;
      box-shadow: 0 4px 20px rgba(37,99,235,.4);
      transition: all .2s;
    }
    .btn-login:hover { background: linear-gradient(135deg, #2563eb, #3b82f6); box-shadow: 0 6px 28px rgba(59,130,246,.5); }
    .alert-danger { background: rgba(255,112,112,.12); border-color: rgba(255,112,112,.3); color: #ff8080; }
    .role-hint { font-size: .75rem; color: #4a5568; text-align: center; margin-top: 1.5rem; }
    .role-hint strong { color: #8892a4; }
    hr.divider { border-color: #2d3348; opacity:1; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5">
        <div class="login-card mx-auto">
          <div class="text-center">
            <div class="login-logo">✍️</div>
            <div class="login-title">Blog Content Generator</div>
            <div class="login-sub">Gemini AI + WordPress · TuEden</div>
          </div>

          {% if error %}
          <div class="alert alert-danger py-2 small mb-3">
            <strong>⚠️</strong> {{ error }}
          </div>
          {% endif %}

          <form method="post" action="/login" autocomplete="on">
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Usuario</label>
              <input
                type="text" id="username" name="username"
                class="form-control form-control-lg"
                placeholder="luis · alejandra · angela"
                autocomplete="username" required autofocus
              >
            </div>
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <input
                  type="password" id="password" name="password"
                  class="form-control form-control-lg"
                  placeholder="••••••••"
                  autocomplete="current-password" required
                >
                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()" title="Mostrar/ocultar">
                  👁
                </button>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-login btn-lg">
                Entrar →
              </button>
            </div>
          </form>

          <hr class="divider">
          <div class="role-hint">
            🛡️ <strong>luis</strong> · admin &nbsp;&nbsp;
            🧠 <strong>alejandra</strong> · psicología &nbsp;&nbsp;
            🩺 <strong>angela</strong> · medicina
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    function togglePwd() {
      const f = document.getElementById('password');
      f.type = f.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
